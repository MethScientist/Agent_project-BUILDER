<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile - Hope AI</title>
  <link rel="stylesheet" href="/static/css/style.css" />
<link rel="stylesheet" href="..\static\css\home.css">
<link rel="stylesheet" href="..\static\css\register.css">
<link rel="stylesheet" href="..\static\css\style.css">
</head>
<body class="dark">

  <header class="dashboard-header">
    <div class="logo">🧠 Hope AI</div>
    <nav class="top-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="plugins.html">Plugins</a>
      <a href="billing.html">Billing</a>
      <div class="profile-menu">
        <img src="assets/img/avatar.png" alt="User Avatar" id="profile-icon" />
        <div id="profile-dropdown" class="hidden">
          <a href="profile.html">Profile</a>
          <a href="settings.html">Settings</a>
          <a href="login.html">Logout</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="profile-container">
    <h2>👤 Your Profile</h2>

    <div class="profile-card">
      <img src="assets/img/avatar.png" alt="Avatar" class="profile-avatar" />

      <form class="profile-form">
        <label>
          Username:
          <input type="text" value="YourUsername" disabled />
        </label>

        <label>
          Email:
          <input type="email" value="your@email.com" disabled />
        </label>

        <label>
          Change Password:
          <input type="password" placeholder="New Password" />
        </label>

        <button type="submit" class="btn">Update Profile</button>
      </form>
    </div>
  </main>

  <script src="/static/js/profile.js"></script>
</body>
</html>
