<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #000000, #212121);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: white;
      padding: 2rem 3rem;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 2rem;
      color: #4e54c8;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }

    .submit-btn {
      width: 100%;
      background-color: #4e54c8;
      color: white;
      padding: 0.9rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .submit-btn:hover {
      background-color: #000000;
    }

    .bottom-text {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .bottom-text a {
      color: #000000;
      text-decoration: none;
      font-weight: bold;
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    
    .logo img {
      width: 80px;
    }
    .error-message {
      color: red;
      margin-bottom: 10px;
      font-weight: bold;
    }
    </style>
<link rel="stylesheet" href="..\static\css\home.css">
<link rel="stylesheet" href="..\static\css\register.css">
<link rel="stylesheet" href="..\static\css\style.css">
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <img src="/static/images/MainIcon.png" alt="Logo de l'école">
    </div>
    <h2>Connexion</h2>
    {% if message %}
      <div class="error-message">
        {{ message }}
      </div>
    {% endif %}
    <form action="/login" method="post">
      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" name="email" required/>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required/>
      </div>
      <button type="submit" class="submit-btn">Se connecter</button>
    </form>


    <div class="bottom-text">
      Pas encore inscrit ? <a href="/register">Créer un compte</a>
    </div>
  </div>
</body>
</html>
