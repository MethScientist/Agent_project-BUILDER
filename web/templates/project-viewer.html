<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Viewer - Hope AI</title>
  <link rel="stylesheet" href="/static/css/style.css" />
<link rel="stylesheet" href="..\..\lib\tom-select\tom-select.css">
<link rel="stylesheet" href="..\static\css\home.css">
<link rel="stylesheet" href="..\static\css\style.css">
</head>
<body class="dark">

  <header class="dashboard-header">
    <div class="logo">🧠 Hope AI</div>
    <nav class="top-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="plugins.html">Plugins</a>
      <a href="history.html">History</a>
      <a href="project-viewer.html" class="active">Project Viewer</a>
      <div class="profile-menu">
        <img src="assets/img/avatar.png" alt="User Avatar" id="profile-icon" />
        <div id="profile-dropdown" class="hidden">
          <a href="profile.html">Profile</a>
          <a href="settings.html">Settings</a>
          <a href="login.html">Logout</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="project-viewer">
    <h2>📁 Project Viewer</h2>

    <section class="prompt-section">
      <h3>📝 Prompt</h3>
      <p id="project-prompt"></p>
    </section>

    <section class="structure-section">
      <h3>📂 Folder Structure</h3>
      <pre id="project-structure"></pre>
    </section>

    <section class="files-section">
      <h3>🧾 Files</h3>
      <div id="file-list"></div>
    </section>

    <div class="viewer-actions">
      <button onclick="downloadProject()">⬇️ Download Project</button>
      <button onclick="openInEditor()">🖥️ Open in Editor</button>
    </div>
  </main>

  <script src="/static/js/project-viewer.js"></script>
</body>
</html>
